<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مستخرج المستندات الهندسية</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: direction 0.3s ease;
    }
    body.en { direction: ltr; }
    body.ar { direction: rtl; }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 650px;
      width: 100%;
      padding: 40px;
    }
    .language-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
    }
    body.en .language-toggle { right: auto; left: 20px; }
    .toggle-btn {
      background: white;
      border: 2px solid #3b82f6;
      color: #3b82f6;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s ease;
    }
    .toggle-btn:hover {
      background: #3b82f6;
      color: white;
    }
    .header { text-align: center; margin-bottom: 35px; }
    .header h1 { color: #1e3a8a; font-size: 30px; margin-bottom: 10px; font-weight: 800; }
    .header p { color: #4b5563; font-size: 15px; line-height: 1.6; }
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; color: #1f2937; font-weight: 700; margin-bottom: 10px; font-size: 14px; }
    .file-input-wrapper { position: relative; display: inline-block; width: 100%; }
    .file-input-wrapper input[type="file"] { display: none; }
    .file-input-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed #3b82f6;
      border-radius: 12px;
      padding: 40px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #eff6ff;
    }
    .file-input-label:hover { border-color: #1d4ed8; background: #dbeafe; }
    .file-input-label.active { border-color: #10b981; background: #f0fdf4; }
    .file-icon { font-size: 40px; margin-bottom: 15px; }
    .file-text { text-align: center; }
    .file-text .main { color: #111827; font-weight: 700; font-size: 15px; margin-bottom: 5px; }
    .file-text .sub { color: #6b7280; font-size: 12px; }
    .file-name { color: #059669; font-weight: 700; font-size: 14px; margin-top: 10px; }
    .extractor-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .radio-option { position: relative; }
    .radio-option input[type="radio"] { display: none; }
    .radio-label {
      display: flex;
      align-items: center;
      padding: 15px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      font-weight: 600;
      color: #4b5563;
    }
    .radio-option input[type="radio"]:checked + .radio-label {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1e3a8a;
    }
    .radio-dot {
      width: 18px;
      height: 18px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      margin-left: 10px;
      transition: all 0.3s ease;
    }
    body.en .radio-dot { margin-left: 0; margin-right: 10px; }
    .radio-option input[type="radio"]:checked + .radio-label .radio-dot {
      border-color: #3b82f6;
      background: #3b82f6;
      box-shadow: inset 0 0 0 3px #eff6ff;
    }
    .button-group { display: flex; gap: 15px; margin-top: 35px; }
    .btn {
      flex: 1;
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #f3f4f6; color: #4b5563; }
    .btn-secondary:hover { background: #e5e7eb; }
    .status { margin-top: 30px; padding: 20px; border-radius: 12px; display: none; }
    .status.show { display: block; }
    .status.info { background: #eff6ff; color: #1e40af; border-right: 5px solid #3b82f6; }
    body.en .status.info { border-right: none; border-left: 5px solid #3b82f6; }
    .status.success { background: #f0fdf4; color: #166534; border-right: 5px solid #10b981; }
    body.en .status.success { border-right: none; border-left: 5px solid #10b981; }
    .status.error { background: #fef2f2; color: #991b1b; border-right: 5px solid #ef4444; }
    body.en .status.error { border-right: none; border-left: 5px solid #ef4444; }
    .progress-bar { width: 100%; height: 6px; background: #d1d5db; border-radius: 3px; margin-top: 15px; overflow: hidden; }
    .progress-fill { height: 100%; background: #3b82f6; width: 30%; animation: loading 2s linear infinite; }
    @keyframes loading {
      0% { transform: translateX(300%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body class="ar">
  <div class="language-toggle">
    <button class="toggle-btn" id="langToggle">English</button>
  </div>

  <div class="container">
    <div class="header">
      <h1 id="title">🏗️ مستخرج المستندات الهندسية</h1>
      <p id="subtitle">نظام ذكي لتحليل واستخراج الجداول من ملفات BOQ والمواصفات والكتالوجات</p>
    </div>

    <form id="extractForm">
      <div class="form-group">
        <label id="selectFileLabel">ملف الـ PDF</label>
        <div class="file-input-wrapper">
          <input type="file" id="pdfFile" accept="application/pdf" required>
          <label for="pdfFile" class="file-input-label" id="fileLabel">
            <div class="file-icon">📄</div>
            <div class="file-text">
              <div class="main" id="dragDropMain">اسحب الملف هنا أو اضغط للاختيار</div>
              <div class="sub" id="dragDropSub">PDF فقط (حد أقصى 100 صفحة)</div>
            </div>
            <div class="file-name" id="fileName"></div>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label id="selectExtractorLabel">نوع المستند (المحرك)</label>
        <div class="extractor-options">
          <div class="radio-option">
            <input type="radio" id="auto" name="extractor" value="auto" checked>
            <label for="auto" class="radio-label" id="autoLabel">
              <span id="autoText">تلقائي (الذكي)</span>
              <span class="radio-dot"></span>
            </label>
          </div>
          <div class="radio-option">
            <input type="radio" id="boq" name="extractor" value="boq">
            <label for="boq" class="radio-label" id="boqLabel">
              <span id="boqText">BOQ Parser</span>
              <span class="radio-dot"></span>
            </label>
          </div>
          <div class="radio-option">
            <input type="radio" id="datasheet" name="extractor" value="datasheet">
            <label for="datasheet" class="radio-label" id="datasheetLabel">
              <span id="datasheetText">Datasheet</span>
              <span class="radio-dot"></span>
            </label>
          </div>
          <div class="radio-option">
            <input type="radio" id="catalog" name="extractor" value="catalog">
            <label for="catalog" class="radio-label" id="catalogLabel">
              <span id="catalogText">Catalog</span>
              <span class="radio-dot"></span>
            </label>
          </div>
          <div class="radio-option">
            <input type="radio" id="specsheet" name="extractor" value="specsheet">
            <label for="specsheet" class="radio-label" id="specsheetLabel">
              <span id="specsheetText">Spec Sheet</span>
              <span class="radio-dot"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="button-group">
        <button type="submit" class="btn btn-primary" id="submitBtn">بدء التحليل والاستخراج</button>
        <button type="button" class="btn btn-secondary" id="resetBtn">مسح</button>
      </div>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script>
    let currentLang = 'ar';
    const translations = {};

    // Load translations
    fetch('/translations')
      .then(r => r.json())
      .then(data => {
        Object.assign(translations, data);
      });

    function t(key, replacements = {}) {
      let text = translations[currentLang]?.[key] || key;
      for (const [k, v] of Object.entries(replacements)) {
        text = text.replace(`{${k}}`, v);
      }
      return text;
    }

    function updateUI() {
      document.getElementById('title').textContent = '🏗️ ' + t('title');
      document.getElementById('subtitle').textContent = t('subtitle');
      document.getElementById('selectFileLabel').textContent = t('selectFile');
      document.getElementById('dragDropMain').textContent = t('dragDrop');
      document.getElementById('dragDropSub').textContent = t('fileLimit');
      document.getElementById('selectExtractorLabel').textContent = t('selectExtractor');
      document.getElementById('autoText').textContent = t('auto');
      document.getElementById('boqText').textContent = t('boq');
      document.getElementById('datasheetText').textContent = t('datasheet');
      document.getElementById('catalogText').textContent = t('catalog');
      document.getElementById('specsheetText').textContent = t('specsheet');
      document.getElementById('submitBtn').textContent = t('extract');
      document.getElementById('resetBtn').textContent = t('reset');
      document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'العربية';
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      document.documentElement.lang = currentLang;
      document.body.classList.toggle('en');
      document.body.classList.toggle('ar');
      updateUI();
    });

    const form = document.getElementById('extractForm');
    const pdfFile = document.getElementById('pdfFile');
    const fileName = document.getElementById('fileName');
    const fileLabel = document.getElementById('fileLabel');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    pdfFile.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        fileName.textContent = e.target.files[0].name;
        fileLabel.classList.add('active');
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      form.reset();
      fileName.textContent = '';
      fileLabel.classList.remove('active');
      statusDiv.classList.remove('show');
      submitBtn.disabled = false;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = pdfFile.files[0];
      const extractor = document.querySelector('input[name="extractor"]:checked').value;

      if (!file) {
        showStatus(t('selectPDF'), 'error');
        return;
      }

      submitBtn.disabled = true;
      showStatus(t('uploading'), 'info');

      const fd = new FormData();
      fd.append('file', file);
      fd.append('extractor', extractor);

      try {
        const res = await fetch('/upload', { method: 'POST', body: fd });
        if (!res.ok) throw new Error(await res.text());
        
        const { job_id } = await res.json();
        pollStatus(job_id);
      } catch (err) {
        showStatus(t('error', { error: err.message }), 'error');
        submitBtn.disabled = false;
      }
    });

    async function pollStatus(job_id) {
      try {
        const res = await fetch(`/status/${job_id}`);
        const data = await res.json();

        if (data.status === 'completed') {
          showStatus(t('success', { parser: data.extractor_used }), 'success');
          setTimeout(() => {
            window.location.href = `/download/${job_id}`;
            submitBtn.disabled = false;
          }, 2000);
        } else if (data.status === 'failed') {
          showStatus(t('error', { error: data.error }), 'error');
          submitBtn.disabled = false;
        } else {
          showStatus(t('processing', { status: data.status }), 'info');
          setTimeout(() => pollStatus(job_id), 2000);
        }
      } catch (err) {
        showStatus(t('connectionError'), 'error');
        submitBtn.disabled = false;
      }
    }

    function showStatus(msg, type) {
      statusDiv.className = `status show ${type}`;
      statusDiv.innerHTML = `<div>${msg}</div>` + (type === 'info' ? '<div class="progress-bar"><div class="progress-fill"></div></div>' : '');
    }

    // Initialize UI
    updateUI();
  </script>
</body>
</html>
