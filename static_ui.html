<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Document Parser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body.en { direction: ltr; }
    body.ar { direction: rtl; }
    .container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-width: 750px;
      width: 100%;
      padding: 40px;
      position: relative;
    }
    .language-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
    }
    body.en .language-toggle { right: auto; left: 20px; }
    .toggle-btn {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #475569;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .toggle-btn:hover { background: #e2e8f0; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { color: #1e3a8a; font-size: 32px; margin-bottom: 12px; font-weight: 800; }
    .header p { color: #64748b; font-size: 16px; }
    .form-group { margin-bottom: 30px; }
    .form-group label { display: block; color: #1e293b; font-weight: 700; margin-bottom: 12px; font-size: 15px; }
    .file-input-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed #3b82f6;
      border-radius: 16px;
      padding: 50px 20px;
      cursor: pointer;
      background: #eff6ff;
      transition: all 0.3s;
    }
    .file-input-label:hover { background: #dbeafe; }
    .file-input-label.active { border-color: #10b981; background: #f0fdf4; }
    .extractor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .radio-option input { display: none; }
    .radio-label {
      display: flex;
      align-items: center;
      padding: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      color: #475569;
      transition: all 0.2s;
    }
    .radio-option input:checked + .radio-label {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1e3a8a;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-2px); }
    .status { margin-top: 30px; padding: 20px; border-radius: 12px; display: none; }
    .status.show { display: block; }
    .status.info { background: #f8fafc; color: #1e40af; border-left: 4px solid #3b82f6; }
    .status.success { background: #f0fdf4; color: #166534; border-left: 4px solid #10b981; }
    .status.error { background: #fef2f2; color: #991b1b; border-left: 4px solid #ef4444; }
  </style>
</head>
<body class="ar">
  <div class="language-toggle">
    <button class="toggle-btn" id="langToggle">English</button>
  </div>

  <div class="container">
    <div class="header">
      <h1 id="title">🔍 Universal Document Parser</h1>
      <p id="subtitle">تحليل واستخراج شامل للمستندات الهندسية (جداول، نصوص، مواصفات)</p>
    </div>

    <form id="extractForm">
      <div class="form-group">
        <label id="fileLabelText">ارفع ملف الـ PDF</label>
        <input type="file" id="pdfFile" accept="application/pdf" style="display:none" required>
        <label for="pdfFile" class="file-input-label" id="fileZone">
          <span style="font-size: 48px">📄</span>
          <span id="dragText" style="margin-top: 15px; font-weight: 700">اسحب الملف هنا أو اضغط للاختيار</span>
          <span id="fileName" style="margin-top: 10px; color: #10b981; font-weight: 800"></span>
        </label>
      </div>

      <div class="form-group">
        <label id="modeLabelText">اختر نوع المستند</label>
        <div class="extractor-grid">
          <div class="radio-option">
            <input type="radio" id="auto" name="extractor" value="auto" checked>
            <label for="auto" class="radio-label">✨ <span id="opt-auto">كشف تلقائي (Auto)</span></label>
          </div>
          <div class="radio-option">
            <input type="radio" id="boq" name="extractor" value="boq">
            <label for="boq" class="radio-label">📊 <span id="opt-boq">جداول كميات (BOQ)</span></label>
          </div>
          <div class="radio-option">
            <input type="radio" id="datasheet" name="extractor" value="datasheet">
            <label for="datasheet" class="radio-label">⚙️ <span id="opt-datasheet">ورقة بيانات (Datasheet)</span></label>
          </div>
          <div class="radio-option">
            <input type="radio" id="catalog" name="extractor" value="catalog">
            <label for="catalog" class="radio-label">📘 <span id="opt-catalog">كتالوج (Catalog)</span></label>
          </div>
          <div class="radio-option">
            <input type="radio" id="specsheet" name="extractor" value="specsheet">
            <label for="specsheet" class="radio-label">📝 <span id="opt-spec">مواصفات (SpecSheet)</span></label>
          </div>
          <div class="radio-option">
            <input type="radio" id="generic" name="extractor" value="generic">
            <label for="generic" class="radio-label">📄 <span id="opt-generic">مستند عام (Generic)</span></label>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">بدء الاستخراج الشامل</button>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script>
    let currentLang = 'ar';
    const translations = {
      ar: {
        title: "🔍 Universal Document Parser",
        subtitle: "تحليل واستخراج شامل للمستندات الهندسية (جداول، نصوص، مواصفات)",
        fileLabel: "ارفع ملف الـ PDF",
        dragText: "اسحب الملف هنا أو اضغط للاختيار",
        modeLabel: "اختر نوع المستند",
        extractBtn: "بدء الاستخراج الشامل",
        success: "تم الاستخراج بنجاح! جاري تحميل ملف Excel...",
        processing: "جاري المعالجة... الحالة: {status}",
        uploading: "جاري رفع الملف...",
        error: "حدث خطأ: {error}"
      },
      en: {
        title: "🔍 Universal Document Parser",
        subtitle: "Comprehensive extraction for engineering docs (Tables, Text, Specs)",
        fileLabel: "Upload PDF File",
        dragText: "Drag & Drop file or click to browse",
        modeLabel: "Select Document Type",
        extractBtn: "Start Universal Extraction",
        success: "Success! Downloading your Excel file...",
        processing: "Processing... Status: {status}",
        uploading: "Uploading file...",
        error: "Error: {error}"
      }
    };

    function updateUI() {
      const t = translations[currentLang];
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('fileLabelText').textContent = t.fileLabel;
      document.getElementById('dragText').textContent = t.dragText;
      document.getElementById('modeLabelText').textContent = t.modeLabel;
      document.getElementById('submitBtn').textContent = t.extractBtn;
      document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'العربية';
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      document.body.className = currentLang;
      updateUI();
    });

    const pdfFile = document.getElementById('pdfFile');
    pdfFile.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        document.getElementById('fileName').textContent = e.target.files[0].name;
        document.getElementById('fileZone').classList.add('active');
      }
    });

    document.getElementById('extractForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = pdfFile.files[0];
      const extractor = document.querySelector('input[name="extractor"]:checked').value;
      const submitBtn = document.getElementById('submitBtn');
      const statusDiv = document.getElementById('status');

      submitBtn.disabled = true;
      statusDiv.className = 'status show info';
      statusDiv.textContent = translations[currentLang].uploading;

      const fd = new FormData();
      fd.append('file', file);
      fd.append('extractor', extractor);

      try {
        const res = await fetch('/upload', { method: 'POST', body: fd });
        const { job_id } = await res.json();
        
        const poll = async () => {
          const sRes = await fetch(`/status/${job_id}`);
          const data = await sRes.json();
          if (data.status === 'completed') {
            statusDiv.className = 'status show success';
            statusDiv.textContent = translations[currentLang].success;
            setTimeout(() => { window.location.href = `/download/${job_id}`; submitBtn.disabled = false; }, 2000);
          } else if (data.status === 'failed') {
            statusDiv.className = 'status show error';
            statusDiv.textContent = translations[currentLang].error.replace('{error}', data.error);
            submitBtn.disabled = false;
          } else {
            statusDiv.textContent = translations[currentLang].processing.replace('{status}', data.status);
            setTimeout(poll, 2000);
          }
        };
        poll();
      } catch (err) {
        statusDiv.className = 'status show error';
        statusDiv.textContent = err.message;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
